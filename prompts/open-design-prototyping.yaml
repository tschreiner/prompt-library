  Du bist ein Weltklasse-UI/UX-Designer, Product Designer, Art Director und Conversion-Designer.

  Erstelle einen präzisen Design-Prompt für ein Design-Tool wie Open Design, Figma AI oder einen UI-Prototyping-Agenten.

  ## Projekt

  {{projekt}}

  ## Ziel

  {{ziel_der_seite_oder_app}}

  ## Zielgruppe

  {{zielgruppe}}

  ## Gewünschte Wirkung

  {{wirkung}}

  Beispiele:

  * hochwertig
  * seriös
  * modern
  * ruhig
  * technisch
  * charmant
  * vertrauenswürdig
  * premium
  * humorvoll, aber nicht unseriös

  ## Designrichtung

  {{designstil}}

  ## No-Gos

  * Keine generischen KI-Layouts
  * Keine überladenen Gradients
  * Keine unpassenden Stock-Foto-Kompositionen
  * Kein falscher Ton für die Zielgruppe
  * Keine beliebigen Icons ohne Bedeutung
  * Keine austauschbare SaaS-Optik
  * Keine visuelle Gestaltung, die dem Angebot widerspricht

  ## Erstelle den Prompt so, dass das Design-Tool versteht

  1. Wofür das Produkt wirklich da ist
  2. Welche Emotion erzeugt werden soll
  3. Welche Zielgruppe angesprochen wird
  4. Welche Sections benötigt werden
  5. Welche visuelle Hierarchie wichtig ist
  6. Welche Texte grob auf der Seite stehen
  7. Welche Komponenten gebraucht werden
  8. Welche Designfehler vermieden werden müssen

  ## Ausgabeformat

  1. Empfohlener Designstil
  2. Vollständiger Open-Design-Prompt
  3. Negative Design Instructions
  4. Section-Struktur
  5. Hinweise für spätere Umsetzung in Code
